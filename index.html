<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Hey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Noto Sans JP"', 'sans-serif'] },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
    .bg-gradient-animated {
      background: linear-gradient(-45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff, #5f27cd);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .hey-fullscreen { animation: heyBounce 0.6s ease-out forwards; }
    .hey-fly { animation: heyFly 0.6s ease-in forwards; }
    @keyframes heyBounce {
      0% { opacity: 0; transform: scale(0.3); }
      50% { transform: scale(1.15); }
      65% { transform: scale(0.92); }
      80% { transform: scale(1.04); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes heyFly {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-120vh) scale(0.6); }
    }
  </style>
</head>
<body class="min-h-screen antialiased bg-gradient-animated" x-data="heyApp()">
  <div class="max-w-md mx-auto min-h-screen flex flex-col pb-safe">
    <!-- Header -->
    <header class="sticky top-0 z-10 px-4 py-3 flex items-center justify-between">
      <button
        type="button"
        @click="showInvitePopup = true"
        class="p-2 text-white/90 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-white/50 rounded-full"
        aria-label="友だちを招待"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3z" />
        </svg>
      </button>
      <h1 class="absolute left-0 right-0 text-center text-2xl font-black text-white tracking-tight pointer-events-none">Hey</h1>
      <div class="w-11 h-11" aria-hidden="true"></div>
    </header>

    <!-- Friend list -->
    <main class="flex-1 px-4 py-4">
      <ul class="space-y-2">
        <template x-for="friend in friends" :key="friend.id">
          <li>
            <button
              type="button"
              @click="sendHey(friend)"
              class="w-full flex items-center gap-4 p-4 bg-white active:scale-[0.98] transition-transform text-left border-0 focus:outline-none focus-visible:ring-2 focus-visible:ring-white"
            >
              <span
                class="w-14 h-14 rounded-full flex-shrink-0 flex items-center justify-center text-xl font-black text-white"
                :style="{ backgroundColor: friend.color }"
                x-text="friend.initial"
              ></span>
              <span class="flex-1 text-lg font-bold text-slate-800" x-text="friend.name"></span>
              <span class="text-3xl font-black" :class="lastHeyedId === friend.id ? 'text-slate-400' : 'text-amber-400'" x-text="lastHeyedId === friend.id ? 'Heyed' : 'Hey'"></span>
            </button>
          </li>
        </template>
      </ul>
    </main>
  </div>

  <!-- Invite popup -->
  <div
    x-show="showInvitePopup"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    @click.self="showInvitePopup = false"
    class="fixed inset-0 z-40 flex items-center justify-center p-4 bg-black/50"
  >
    <div class="bg-white w-full max-w-sm p-5 shadow-xl" @click.stop>
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-extrabold text-slate-800">友だちを招待</h3>
        <button type="button" @click="showInvitePopup = false" class="p-1 text-slate-500 hover:text-slate-800">×</button>
      </div>
      <input
        type="text"
        readonly
        x-ref="inviteInput"
        :value="inviteLink"
        class="w-full px-4 py-3 border-2 border-slate-200 text-sm font-bold text-slate-600 mb-3"
      />
      <button
        type="button"
        @click="copyInviteLink(); showInvitePopup = false"
        class="w-full py-3 font-bold bg-emerald-500 text-white active:scale-95 transition-transform"
      >
        リンクをコピー
      </button>
      <p x-show="copied" x-transition class="mt-2 text-sm font-bold text-emerald-600">コピーしました</p>
    </div>
  </div>

  <!-- Fullscreen Hey overlay -->
  <div
    x-show="showHey"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-300"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 pointer-events-none"
  >
    <p
      x-show="showHey"
      :class="{ 'hey-fullscreen': !heyFlying, 'hey-fly': heyFlying }"
      class="text-[min(28vw,28vh)] font-black text-white"
      style="text-shadow: 0 0.02em 0.05em rgba(0,0,0,0.5);"
      x-text="heyText"
    ></p>
  </div>

  <script>
    function heyApp() {
      const inviteBase = typeof location !== 'undefined' ? location.origin + '/invite/me' : 'https://hey.app/invite/me';
      return {
        friends: [
          { id: '1', name: 'Akira Tanaka', initial: 'A', color: '#f59e0b' },
          { id: '2', name: 'Yui Sato', initial: 'Y', color: '#ec4899' },
          { id: '3', name: 'Daiki Suzuki', initial: 'D', color: '#8b5cf6' },
          { id: '4', name: 'Mio Takahashi', initial: 'M', color: '#06b6d4' },
          { id: '5', name: 'Riku Ito', initial: 'R', color: '#10b981' },
        ],
        inviteLink: inviteBase,
        copied: false,
        showInvitePopup: false,
        showHey: false,
        heyText: 'Hey',
        heyFlying: false,
        lastHeyedId: null,

        sendHey(friend) {
          this.heyText = 'Hey';
          this.heyFlying = false;
          this.showHey = true;
          this.lastHeyedId = friend.id;
          setTimeout(() => {
            this.heyFlying = true;
          }, 400);
          setTimeout(() => {
            this.showHey = false;
            this.heyFlying = false;
          }, 1000);
          setTimeout(() => {
            this.lastHeyedId = null;
          }, 3000);
        },

        copyInviteLink() {
          const input = this.$refs.inviteInput;
          if (input) {
            input.select();
            input.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(this.inviteLink);
            this.copied = true;
            setTimeout(() => (this.copied = false), 2000);
          }
        },
      };
    }
  </script>
</body>
</html>
